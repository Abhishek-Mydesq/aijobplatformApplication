server:
  port: 8092
spring:
  application:
    name: scheduler-service

  datasource:
    url: jdbc:mysql://localhost:3306/ai_job_scheduler
    username: root
    password: abes290@
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: localhost:9092
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    instance-id: ${spring.application.name}:${server.port}
    prefer-ip-address: true
    ip-address: 127.0.0.1
    hostname: localhost
    lease-renewal-interval-in-seconds: 5

logging:
  level:
    root: INFO